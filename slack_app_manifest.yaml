_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: La Chona
  description: "La Chona: bot de cultura de equipo. Motivación, preguntas, menciones aleatorias, cumpleaños y aniversarios. Español e inglés."
  background_color: "#2E4057"
  long_description: "¡La Chona es tu bot de cultura de equipo para Slack! Publica mensajes motivacionales automáticos, hace preguntas dinámicas, invita a compartir fotos e historias, menciona miembros aleatoriamente, y celebra cumpleaños, aniversarios laborales y logros del equipo. Diseñada para fortalecer la conexión, motivación y participación de equipos de trabajo en empresas de todos los tamaños. Funciona en inglés y español. ¡Que viva La Chona!"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: La Chona
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - chat:write.public
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - mpim:write
      - users:read
      - commands

settings:
  event_subscriptions:
    bot_events:
      - app_home_opened
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
